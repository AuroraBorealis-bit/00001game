<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>单光纤功率传输计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            background: white;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 25px;
        }

        button:hover {
            background-color: #2980b9;
        }

        .result-box {
            padding: 20px;
            background-color: #e8f4fd;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
        }

        .result-title {
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .result-value {
            color: #e74c3c;
            font-size: 24px;
            font-weight: bold;
        }

        .battery-box {
            padding: 15px;
            background-color: #f0f8ff;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 15px;
            line-height: 1.7;
        }

        .battery-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }

        .unit {
            font-size: 16px;
            margin-left: 5px;
        }

        .params {
            margin-top: 20px;
            font-size: 12px;
            color: #7f8c8d;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>单光纤功率传输计算器</h2>
        
        <div class="input-group">
            <label>传输距离 (KM)</label>
            <input type="number" id="distance" placeholder="请输入传输距离" min="0" step="0.01">
        </div>

        <div class="input-group">
            <label>输入电功率 (W)</label>
            <input type="number" id="inputPower" placeholder="请输入输入电功率" min="0" step="0.01">
        </div>

        <button onclick="calculatePower()">计算输出电功率 & 电池重量</button>

        <div class="result-box">
            <div class="result-title">输出电功率：</div>
            <div class="result-value" id="outputResult">0.00</div>
            <span class="unit">W</span>
        </div>

        <!-- 新增：24小时电池重量显示 -->
        <div class="battery-box" id="batteryResult" style="display:none;">
            <div class="battery-item">
                <span>📊 24h激光器所需功率等效电池重量：</span>
                <strong id="laserBatteryWeight">0.00 kg</strong>
            </div>
            <div class="battery-item">
                <span>📊 24h输出功率等效电池重量：</span>
                <strong id="outputBatteryWeight">0.00 kg</strong>
            </div>
        </div>

        <div class="params">
            固定参数：<br>
            光纤传输损耗：0.168dB/km | 耦合损耗：0.3dB×2 | 电光转换30% | 光电转换35% | 分光损耗10%<br>
            电池：宁德时代麒麟电池 能量密度 255Wh/kg
        </div>
    </div>

    <script>
        function calculatePower() {
            // 1. 获取输入
            const distance = parseFloat(document.getElementById('distance').value) || 0;
            const inputPower = parseFloat(document.getElementById('inputPower').value) || 0;

            // 2. 固定参数
            const fiberLoss = 0.168;
            const coupleLoss = 0.3;
            const laserEfficiency = 0.30 * 0.35;
            const energyDensity = 255; // 麒麟电池 255Wh/kg
            const hours = 24;

            // 3. 总损耗
            const totalLossDb = coupleLoss * 2 + distance * fiberLoss;
            const lossMultiplier = Math.pow(10, -totalLossDb / 10);

            // 4. 输出功率（原公式不变）
            const outputPower = inputPower * laserEfficiency * lossMultiplier * laserEfficiency * 0.9;

            // --------------------------
            // 新增：24小时电池重量计算
            // --------------------------
            // 1) 激光器24h总能量 = 输入功率 × 24h
            const laserEnergy = inputPower * hours;
            const laserBatteryWeight = laserEnergy / energyDensity;

            // 2) 输出功率等效24h电池重量
            const outputEnergy = outputPower * hours;
            const outputBatteryWeight = outputEnergy / energyDensity;

            // 5. 显示结果
            document.getElementById('outputResult').innerText = outputPower.toFixed(4);
            document.getElementById('laserBatteryWeight').innerText = laserBatteryWeight.toFixed(3) + " kg";
            document.getElementById('outputBatteryWeight').innerText = outputBatteryWeight.toFixed(3) + " kg";
            document.getElementById('batteryResult').style.display = "block";
        }
    </script>
</body>
</html>
