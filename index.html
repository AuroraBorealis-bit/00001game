<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心：适配手机屏幕，禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>光纤功率传输计算器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            background: white;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 25px;
        }

        button:hover {
            background-color: #2980b9;
        }

        .result-box {
            padding: 20px;
            background-color: #e8f4fd;
            border-radius: 8px;
            text-align: center;
        }

        .result-title {
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .result-value {
            color: #e74c3c;
            font-size: 24px;
            font-weight: bold;
        }

        .unit {
            font-size: 16px;
            margin-left: 5px;
        }

        .params {
            margin-top: 20px;
            font-size: 12px;
            color: #7f8c8d;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>光纤功率传输计算器</h2>
        
        <div class="input-group">
            <label>传输距离 (KM)</label>
            <input type="number" id="distance" placeholder="请输入传输距离" min="0" step="0.01">
        </div>

        <div class="input-group">
            <label>输入电功率 (W)</label>
            <input type="number" id="inputPower" placeholder="请输入输入电功率" min="0" step="0.01">
        </div>

        <button onclick="calculatePower()">计算输出电功率</button>

        <div class="result-box">
            <div class="result-title">输出电功率：</div>
            <div class="result-value" id="outputResult">0.00</div>
            <span class="unit">W</span>
        </div>

        <!-- 内置固定参数说明 -->
        <div class="params">
            固定参数：<br>
            光纤传输损耗：0.168dB/km | 空-实耦合损耗：0.3dB×2 | 激光器电光转换效率：30% | 光芯片光电转换效率：35%
        </div>
    </div>

    <script>
        // 核心计算函数
        function calculatePower() {
            // 1. 获取用户输入值
            const distance = parseFloat(document.getElementById('distance').value) || 0;
            const inputPower = parseFloat(document.getElementById('inputPower').value) || 0;

            // 2. 固定参数
            const fiberLoss = 0.168;        // 光纤传输损耗 dB/km
            const coupleLoss = 0.3;         // 单次耦合损耗 dB
            const laserEfficiency = 0.30*0.35;   // 电光转换效率 30% 光电转换效率35%

            // 3. 计算总损耗（dB）：耦合损耗×2 + 传输距离×光纤损耗
            const totalLossDb = coupleLoss * 2 + distance * fiberLoss;
            
            // 4. dB转换为线性倍数（核心公式：损耗倍数 = 10^(-损耗dB/10)）
            const lossMultiplier = Math.pow(10, -totalLossDb / 10);

            // 5. 最终输出功率公式：输入功率 × 转换效率 × 总损耗倍数 × 转换效率
            const outputPower = inputPower * laserEfficiency * lossMultiplier * laserEfficiency;

            // 6. 保留4位小数显示结果
            document.getElementById('outputResult').innerText = outputPower.toFixed(4);
        }
    </script>
</body>
</html>
